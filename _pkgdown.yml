url: https://rtrace-dev.github.io/rtrace/

template:
  bootstrap: 5
  bslib:
    primary: "#0969da"

home:
  title: RTrace
  description: >
    Architecture governance and static analysis for R projects and packages.

navbar:
  structure:
    left: [reference, news, guides]
    right: [github]
  components:
    guides:
      text: Guides
      menu:
        - text: Quick Start
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/quick-start.md
        - text: Configuration Reference
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/configuration-reference.md
        - text: Rules Reference
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/rules-reference.md
        - text: Rule Authoring Guide
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/rule-authoring-guide.md
        - text: CLI Reference
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/cli-reference.md
        - text: -------
        - text: Architecture Decision Records
          href: https://github.com/rtrace-dev/rtrace/tree/main/dev/adr
        - text: Roadmap
          href: https://github.com/rtrace-dev/rtrace/blob/main/dev/roadmap.md

