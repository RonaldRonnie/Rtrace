version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace_dev_pw
      POSTGRES_DB: trace_cloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://trace:trace_dev_pw@postgres:5432/trace_cloud
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      RTRACE_API_URL: http://rtrace-engine:8394
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  worker:
    build:
      context: ./apps/api
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://trace:trace_dev_pw@postgres:5432/trace_cloud
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      RTRACE_API_URL: http://rtrace-engine:8394
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker

  rtrace-engine:
    image: rocker/r-ver:4.4
    restart: unless-stopped
    working_dir: /rtrace
    volumes:
      - ../../:/rtrace-pkg:ro
      - rtrace_lib:/usr/local/lib/R/site-library
    ports:
      - "8394:8394"
    environment:
      R_LIBS_USER: /usr/local/lib/R/site-library
    command: >
      Rscript -e "
        options(repos = c(CRAN='https://cloud.r-project.org'));
        if (!requireNamespace('plumber', quietly=TRUE)) install.packages('plumber');
        if (!requireNamespace('RTrace', quietly=TRUE)) {
          install.packages(c('R6','rlang','yaml'));
          install.packages('/rtrace-pkg', repos=NULL, type='source');
        }
        library(RTrace);
        start_api(host='0.0.0.0', port=8394)
      "

  web:
    build:
      context: ./apps/web
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  rtrace_lib:
